<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - CodeAlpha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>




    
   <div class="img-gallery">
<img src="images/img1.jpg.jpg">
<img src="images/img2.jpg.jpg">
<img src="images/img3.jpg.jpg">
<img src="images/img4.jpg.jpg">
<img src="images/img5.jpg.jpg">
<img src="images/img6.jpg.jpg">
<img src="images/img7.jpg.jpg">
<img src="images/img8.jpg.jpg">


   </div>
   <!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>

    <span class="nav prev">&#10094;</span>
    <img id="lightbox-img">
    <span class="nav next">&#10095;</span>
</div>



   
    


</body>
<h2> Image Gallery-CodeAlpha
    :- Sandhya Singh

</h2>
<script>
    const images = document.querySelectorAll(".img-gallery img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const closeBtn = document.querySelector(".close");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");

    let currentIndex = 0;

    function showImage(index) {
        if (index < 0) index = images.length - 1;
        if (index >= images.length) index = 0;
        currentIndex = index;
        lightboxImg.src = images[currentIndex].src;
    }

    images.forEach((img, index) => {
        img.addEventListener("click", () => {
            lightbox.style.display = "flex";
            showImage(index);
        });
    });

    nextBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        showImage(currentIndex + 1);
    });

    prevBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        showImage(currentIndex - 1);
    });

    closeBtn.addEventListener("click", () => {
        lightbox.style.display = "none";
    });

    lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) {
            lightbox.style.display = "none";
        }
    });

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
        if (lightbox.style.display === "flex") {
            if (e.key === "ArrowRight") showImage(currentIndex + 1);
            if (e.key === "ArrowLeft") showImage(currentIndex - 1);
            if (e.key === "Escape") lightbox.style.display = "none";
        }
    });
</script>


</html>
